<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Landing</title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
    />

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body{
            overflow-x: hidden;
        }

        .hero{
            min-height: 100vh;
            background: linear-gradient(135deg,#5573cc,#00c6ff);
            position: relative;
            color: white;
            padding-bottom: 120px;
        }

       
        .hero::after{
            content: "";
            position: absolute;
            bottom: -1px;
            left: 0;
            width: 100%;
            height: 140px;
            background: white;
            clip-path: polygon(0 70%,100% 30%,100% 100%,0 100%);
        }

        .navbar{
            padding: 25px 0;
        }

        .navbar-brand{
            color: white !important;
            font-weight: 300;
        }

        .nav-link{
            color: white !important;
            margin: 0 15px;
            font-size: 14px;
        }

        .btn-start{
            border: 1px solid rgba(255,255,255,0.5);
            color: white;
            padding: 10px 22px;
            border-radius: 5px;
            transition: 0.3s;
        }

        .btn-start:hover{
            background: white;
            color: #333;
        }

        .hero-content{
            padding-top: 80px;
        }

        .hero-title{
            font-size: 64px;
            font-weight: 300;
            line-height: 1.1;
            margin-bottom: 25px;
        }

        .hero-text{
            color: rgba(255,255,255,0.8);
            line-height: 1.9;
            max-width: 450px;
            margin-bottom: 35px;
        }

        .btn-pricing{
            background: #28d74b;
            color: white;
            padding: 12px 35px;
            border-radius: 40px;
            border: none;
            font-size: 16px;
            font-weight: 350;
            transition: 0.3s;
        }

        .btn-pricing:hover{
            background: rgb(39, 16, 165);
            color: white;
        }

       
        .signup-card{
            background: white;
            padding: 40px;
            border-radius: 5px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.2);
        }

        .signup-card h2{
            color: black;
            text-align: center;
            margin-bottom: 30px;
            font-weight: 350;
        }

        .form-control{
            background: #f2f2f2;
            border: none;
            border-radius: 0;
            height: 50px;
            margin-bottom: 18px;
        }

        .form-control::placeholder{
          color: #999;
              }

      .form-select{
    background: #f2f2f2;
    border: none;
    border-radius: 0;
    height: 50px;
    margin-bottom: 18px;
    appearance: auto;
    color: #999;
         }

        .btn-register{
            width: 100%;
            background: linear-gradient(to right,#5573cc,#00b7ff);
            border: none;
            height: 50px;
            border-radius: 30px;
            color: white;
            font-weight: 500;
            box-shadow: 0px 15px 40px rgba(112, 117, 247, 0.741);

        }

        .btn-register:hover{
            opacity: 0.9;
            
        }

     
    </style>
</head>

<body>

    
    <section class="hero">

        <!-- Navbar -->
        <div class="container">
            <nav class="navbar navbar-expand-lg">

                <a class="navbar-brand" href="#">Landing</a>

                <button
                    class="navbar-toggler"
                    type="button"
                    data-bs-toggle="collapse"
                    data-bs-target="#navbarNav"
                >
                    <span class="navbar-toggler-icon"></span>
                </button>

                <div class="collapse navbar-collapse" id="navbarNav">

                    <ul class="navbar-nav ms-auto me-3">
                        <li class="nav-item">
                            <a class="nav-link" href="#">Home</a>
                        </li>

                        <li class="nav-item">
                            <a class="nav-link" href="#">Features</a>
                        </li>

                        <li class="nav-item">
                            <a class="nav-link" href="#">Reviews</a>
                        </li>

                        <li class="nav-item">
                            <a class="nav-link" href="#">Pricing</a>
                        </li>

                        <li class="nav-item">
                            <a class="nav-link" href="#">FAQ</a>
                        </li>
                    </ul>

                    <a href="#" class="btn btn-start">
                        Get Started
                    </a>

                </div>
            </nav>
        </div>

        <div class="container hero-content">

            <div class="row align-items-center">

                
                <div class="col-lg-6">

                    <h1 class="hero-title">
                        Fly makes you faster
                    </h1>

                    <p class="hero-text">
                        New free template by uicookies.com. 
                        For more templates visit the site.
                        Lorem ipsum dolor sit amet,
                        consectetur adipisicing elit.
                    </p>

                    <button class="btn-pricing">
                        SEE PRICING
                    </button>

                </div>

              
                <div class="col-lg-5 ms-auto mt-5 mt-lg-0">

                    <div class="signup-card">

                        <h2>Sign Up for Free</h2>

                        <form>

                            <input type="text" class="form-control" placeholder="Full name">

                            <input type="email" class="form-control" placeholder="Email" >

                            <input type="password" class="form-control" placeholder="Password" >

                            <select class="form-select">
                                <option>Type</option>
                                <option>Type 1</option>
                                <option>Type 2</option>
                            </select>

                            <button class="btn-register">
                                Register
                            </button>

                        </form>

                    </div>

                </div>

            </div>

        </div>

    </section>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
